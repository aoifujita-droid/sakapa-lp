<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIエージェント家庭教師：Claude Code導入サポート｜プラン表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #008A83;
      --green-deep: #006B65;
      --green-dark: #14398D;
      --green-soft: #F1F8F8;
      --green-light: #E0F2F1;
      --bg-soft: #F7F9FA;
      --line: #E5EAEA;
      --text: #1F2937;
      --muted: #595757;
      --white: #ffffff;
      --yellow: #FFD800;
      --radius: 10px;
      --shadow: 0 10px 28px rgba(0, 107, 101, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans JP", sans-serif;
      color: var(--text);
      background: var(--bg-soft);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      padding: 40px 20px 60px;
    }
    .page {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    .doc-header {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
      color: #fff;
      border-radius: 16px;
      padding: 32px 36px;
      margin-bottom: 28px;
    }
    .doc-header .label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      opacity: .8;
      margin-bottom: 6px;
    }
    .doc-header h1 {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.3;
    }
    .doc-header .date {
      font-size: 12px;
      opacity: .75;
      margin-top: 8px;
    }

    /* Section title */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--green-deep);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 10px;
      border-left: 3px solid var(--green);
    }

    /* Plan table */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead tr {
      background: var(--green);
      color: #fff;
    }
    thead th {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    tbody tr {
      border-bottom: 1px solid var(--line);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--green-soft); }
    tbody td {
      padding: 13px 16px;
      text-align: center;
      color: var(--text);
    }
    tbody td:first-child {
      text-align: left;
      font-weight: 700;
    }
    .plan-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .badge-light    { background: var(--green-light); color: var(--green-deep); }
    .badge-lightp   { background: #E8F5E9; color: #2E7D32; }
    .badge-standard { background: #E3F2FD; color: #1565C0; }
    .badge-group    { background: #FFF3E0; color: #E65100; }
    .badge-team     { background: #F3E5F5; color: #6A1B9A; }

    .price-cell {
      font-weight: 700;
      color: var(--green-deep);
    }
    .muted { color: var(--muted); font-size: 13px; }

    /* Summary */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      text-align: center;
    }
    .summary-card .plan-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .summary-card .count {
      font-size: 32px;
      font-weight: 900;
      color: var(--green);
      line-height: 1;
    }
    .summary-card .count span {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }
    .summary-card .amount {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Total */
    .total-card {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-deep) 100%);
      border-radius: var(--radius);
      padding: 24px 28px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 24px rgba(0,138,131,.25);
    }
    .total-card .label {
      font-size: 14px;
      font-weight: 700;
      opacity: .85;
    }
    .total-card .amount {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .total-card .amount span {
      font-size: 18px;
      font-weight: 500;
      opacity: .8;
    }
    .total-card .contracts {
      font-size: 13px;
      opacity: .75;
      margin-top: 2px;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .card, .summary-card, .total-card { box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="doc-header">
    <div class="label">CONTRACT PLAN TABLE</div>
    <h1>AIエージェント家庭教師：Claude Code導入サポート<br>プラン表</h1>
    <div class="date">作成日：2026年4月22日</div>
  </div>

  <!-- Plan Table -->
  <div class="section-title">プラン一覧</div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>プラン名</th>
          <th>回数</th>
          <th>時間</th>
          <th>参加人数</th>
          <th>価格（万円）</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="plan-badge badge-light">ライト</span></td>
          <td>1</td>
          <td>1.5h</td>
          <td>1名</td>
          <td class="price-cell">10</td>
        </tr>
        <tr>
          <td><span class="plan-badge badge-lightp">ライト+</span></td>
          <td>1</td>
          <td>1.5h</td>
          <td>3名</td>
          <td class="price-cell">20</td>
        </tr>
        <tr>
          <td><span class="plan-badge badge-standard">スタンダード</span></td>
          <td>3</td>
          <td>1.5h, 1h, 1h</td>
          <td>3名</td>
          <td class="price-cell">30</td>
        </tr>
        <tr>
          <td><span class="plan-badge badge-group">グループ</span></td>
          <td>3</td>
          <td>1.5h, 1h, 1h</td>
          <td>10名</td>
          <td class="price-cell">100</td>
        </tr>
        <tr>
          <td><span class="plan-badge badge-team">チーム</span></td>
          <td>3</td>
          <td>1.5h, 1h, 1h</td>
          <td class="muted">応相談</td>
          <td class="muted">応相談</td>
        </tr>
      </tbody>
    </table>
  </div>


</div>
</body>
</html>
